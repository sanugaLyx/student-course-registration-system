# ─────────────────────────────────────────────────────────────
# 📁 FILE: src/main/resources/application.properties
# 🏗  LAYER: Backend — Configuration
# 📋 ROLE: Environment variables and configuration settings for Spring Boot.
#          Defines port, DB connection, and Hibernate behavior.
# ─────────────────────────────────────────────────────────────

# [L1] The port the embedded Tomcat server will listen on
server.port=8080

# -- Static HTML Files --------------------------------------------------------
# [L2] Spring Boot automatically serves files from src/main/resources/static/
# However, in this project, the frontend is decoupled and served separately
# via Node.js or Python.
spring.web.resources.static-locations=classpath:/static/

# -- MySQL Database Connection -----------------------------------------------
# [L1] JDBC URL: connects to local MySQL DB named 'scrs_db'
spring.datasource.url=jdbc:mysql://localhost:3306/scrs_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# [L1] Database username
spring.datasource.username=root
# [L1] Database password
spring.datasource.password=01379
# [L1] Specific driver to use for MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -- JPA / Hibernate ---------------------------------------------------------
# [L2] ddl-auto=update: Hibernate will automatically create or update DB tables
# to match the @Entity classes (Student, Course, etc.) upon startup.
# WARNING: 'update' is great for dev, but 'validate' or 'none' should be used in prod.
spring.jpa.hibernate.ddl-auto=update

# [L1] Prints generated SQL queries to the console for debugging
spring.jpa.show-sql=true

# [L1] Tells Hibernate we are using MySQL, so it generates MySQL-specific SQL dialects
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# [L1] Formats the SQL output in the console to be multi-line and readable
spring.jpa.properties.hibernate.format_sql=true

# -- JSON --------------------------------------------------------------------
# [L1] Jackson will exclude fields that are 'null' when returning JSON responses
spring.jackson.default-property-inclusion=non_null
