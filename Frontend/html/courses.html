<!--
  ─────────────────────────────────────────────────────────────
  📁 FILE: Frontend/html/courses.html
  🏗  LAYER: Frontend — View (HTML)
  📋 ROLE: Displays the course catalog. Includes modal for CRUD operations.
  ─────────────────────────────────────────────────────────────
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="SCRS — Course Management"/>
<title>SCRS — Courses</title>
<!-- [L1] Webfonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<!-- [L1] Toast container -->
<div id="toast-container"></div>
<div class="app-shell">
  
  <!-- [L2] Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon"><span class="material-icons-round">school</span></div><div class="sidebar-logo-name">SCRS<span>SE1020 Project</span></div></div>
    <!-- [L1] User details dynamically filled -->
    <div class="sidebar-user"><div class="sidebar-avatar" id="sb-avatar">U</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sb-name">User</div><div class="sidebar-user-role" id="sb-role">—</div></div></div>
    <nav class="sidebar-nav" id="sidebar-nav-main"></nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()" style="color:var(--col-error)"><span class="material-icons-round" style="color:var(--col-error)">logout</span>Sign Out</button></div>
  </aside>
  
  <div class="main-content">
    <!-- [L1] Topbar -->
    <div class="topbar">
      <div class="topbar-title"><h2>Course Management</h2><p>SE1020 — Student Course Registration System</p></div>
      <div class="topbar-actions"><button class="btn btn-secondary btn-sm" onclick="logout()"><span class="material-icons-round">logout</span>Sign Out</button></div>
    </div>
    
    <div class="page-body">
      <!-- [L2] Action Toolbar (Search and Filters) -->
      <div class="toolbar">
        <div class="search-box">
          <span class="material-icons-round">search</span>
          <!-- [L1] Triggers JS local filter on keypress -->
          <input type="text" placeholder="Search by name, ID, or department..." id="search-courses" oninput="filterCourses()"/>
        </div>
        
        <!-- [L1] Filter Chips for Polymorphism (Core vs Elective) -->
        <div class="chip-row" id="filter-chips-courses" style="margin-bottom:0">
          <span class="chip active" onclick="filterCourseChip(this,'ALL')">All</span>
          <span class="chip" onclick="filterCourseChip(this,'CORE')">Core</span>
          <span class="chip" onclick="filterCourseChip(this,'ELEC')">Elective</span>
        </div>
        <!-- [L1] Add button is hidden from non-Deans via JS -->
        <button class="btn btn-primary" id="btn-add-course" onclick="openModal('modal-course')"><span class="material-icons-round">add</span>Add Course</button>
      </div>
      
      <!-- [L2] Data Table -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Course Name</th><th>Lecturer</th><th>Department</th><th>Credits</th><th>Capacity</th><th>Type</th><th>Actions</th></tr></thead>
            <!-- [L1] Data injected here by courses.js -->
            <tbody id="courses-tbody"><tr class="loading-row"><td colspan="8"><span class="spinner"></span>Loading courses...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- [L2] CRUD Modal for Courses (Hidden by default) -->
<div id="modal-course" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-course-title">Add New Course</h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('modal-course')"><span class="material-icons-round">close</span></button>
    </div>
    <div id="modal-course-alert" class="alert alert-error hidden"><span class="material-icons-round">error_outline</span><span id="modal-course-alert-text"></span></div>
    
    <!-- [L1] Form Inputs -->
    <div class="field-row">
      <div class="field"><label>Course ID</label><input type="text" id="crs-id" placeholder="e.g. CS103"/></div>
      <!-- [L1] Crucial: Select dictates Jackson Polymorphic Deserialization sub-type -->
      <div class="field"><label>Type</label><select id="crs-type"><option value="CORE">Core</option><option value="ELEC">Elective</option></select></div>
    </div>
    <div class="field"><label>Course Name</label><input type="text" id="crs-name" placeholder="e.g. Advanced Algorithms"/></div>
    <div class="field-row">
      <div class="field"><label>Lecturer ID</label><input type="text" id="crs-lecturer" placeholder="e.g. L001"/></div>
      <div class="field"><label>Department ID</label><input type="text" id="crs-dept" placeholder="e.g. DEPT01"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Credits</label><input type="number" id="crs-credits" value="3" min="1" max="6"/></div>
      <div class="field"><label>Max Capacity</label><input type="number" id="crs-cap" value="30" min="1"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-course')">Cancel</button>
      <!-- [L1] Trigger save logic -->
      <button class="btn btn-primary" onclick="saveCourse()"><span class="material-icons-round">save</span>Save Course</button>
    </div>
  </div>
</div>

<!-- [L2] Generic Confirmation Modal (Triggered by auth.js) -->
<div id="modal-confirm" class="modal-overlay hidden confirm-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="confirm-icon"><span class="material-icons-round">delete_outline</span></div>
      <h3>Confirm Delete</h3>
      <p id="confirm-text" style="color:var(--col-500);font-size:.875rem;text-align:center">Are you sure?</p>
    </div>
    <div class="modal-footer" style="justify-content:center">
      <button class="btn btn-outline" onclick="closeModal('modal-confirm')">Cancel</button>
      <button class="btn btn-danger" id="confirm-delete-btn"><span class="material-icons-round">delete</span>Delete</button>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/courses.js"></script>
</body>
</html>
