<!--
  ─────────────────────────────────────────────────────────────
  📁 FILE: Frontend/html/departments.html
  🏗  LAYER: Frontend — View (HTML)
  📋 ROLE: Manages University Departments. Restricted to Deans.
  ─────────────────────────────────────────────────────────────
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="SCRS — Department Management"/>
<title>SCRS — Departments</title>
<!-- [L1] Webfonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<!-- [L1] Toast container -->
<div id="toast-container"></div>
<div class="app-shell">
  
  <!-- [L2] Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon"><span class="material-icons-round">school</span></div><div class="sidebar-logo-name">SCRS<span>SE1020 Project</span></div></div>
    <!-- [L1] User details dynamically filled -->
    <div class="sidebar-user"><div class="sidebar-avatar" id="sb-avatar">U</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sb-name">User</div><div class="sidebar-user-role" id="sb-role">—</div></div></div>
    <nav class="sidebar-nav" id="sidebar-nav-main"></nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()" style="color:var(--col-error)"><span class="material-icons-round" style="color:var(--col-error)">logout</span>Sign Out</button></div>
  </aside>
  
  <div class="main-content">
    <!-- [L1] Topbar -->
    <div class="topbar">
      <div class="topbar-title"><h2>Department Management</h2><p>SE1020 — Student Course Registration System</p></div>
      <div class="topbar-actions"><button class="btn btn-secondary btn-sm" onclick="logout()"><span class="material-icons-round">logout</span>Sign Out</button></div>
    </div>
    
    <div class="page-body">
      <!-- [L2] Action Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <span class="material-icons-round">search</span>
          <!-- [L1] Triggers JS local filter on keypress -->
          <input type="text" placeholder="Search departments..." id="search-depts" oninput="filterDepts()"/>
        </div>
        <!-- [L1] Button opens creation modal -->
        <button class="btn btn-primary" id="btn-add-dept" onclick="openModal('modal-dept')"><span class="material-icons-round">add</span>Add Department</button>
      </div>
      
      <!-- [L2] Data Table -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Department Name</th><th>Dean ID</th><th>Actions</th></tr></thead>
            <!-- [L1] Data injected here by departments.js -->
            <tbody id="departments-tbody"><tr class="loading-row"><td colspan="4"><span class="spinner"></span>Loading departments...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- [L2] CRUD Modal for Departments (Hidden by default) -->
<div id="modal-dept" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-dept-title">Add Department</h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('modal-dept')"><span class="material-icons-round">close</span></button>
    </div>
    <div id="modal-dept-alert" class="alert alert-error hidden"><span class="material-icons-round">error_outline</span><span id="modal-dept-alert-text"></span></div>
    
    <!-- [L1] Form Inputs -->
    <div class="field-row">
      <div class="field"><label>Department ID</label><input type="text" id="dept-id" placeholder="e.g. DEPT04"/></div>
      <div class="field"><label>Dean ID</label><input type="text" id="dept-dean" placeholder="e.g. D001"/></div>
    </div>
    <div class="field"><label>Department Name</label><input type="text" id="dept-name" placeholder="e.g. Artificial Intelligence"/></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-dept')">Cancel</button>
      <!-- [L1] Trigger save logic -->
      <button class="btn btn-primary" onclick="saveDept()"><span class="material-icons-round">save</span>Save Department</button>
    </div>
  </div>
</div>

<!-- [L2] Generic Confirmation Modal (Triggered by auth.js) -->
<div id="modal-confirm" class="modal-overlay hidden confirm-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="confirm-icon"><span class="material-icons-round">delete_outline</span></div>
      <h3>Confirm Delete</h3>
      <p id="confirm-text" style="color:var(--col-500);font-size:.875rem;text-align:center">Are you sure?</p>
    </div>
    <div class="modal-footer" style="justify-content:center">
      <button class="btn btn-outline" onclick="closeModal('modal-confirm')">Cancel</button>
      <button class="btn btn-danger" id="confirm-delete-btn"><span class="material-icons-round">delete</span>Delete</button>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/departments.js"></script>
</body>
</html>
