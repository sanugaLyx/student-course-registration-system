<!--
  ─────────────────────────────────────────────────────────────
  📁 FILE: Frontend/html/student-profile.html
  🏗  LAYER: Frontend — View (HTML)
  📋 ROLE: Allows students to view/edit their own profile details.
  ─────────────────────────────────────────────────────────────
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="SCRS — Student Profile"/>
<title>SCRS — My Profile</title>
<!-- [L1] Webfonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<!-- [L1] Toast container -->
<div id="toast-container"></div>
<div class="app-shell">
  <!-- [L2] Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon"><span class="material-icons-round">school</span></div><div class="sidebar-logo-name">SCRS<span>SE1020 Project</span></div></div>
    <div class="sidebar-user"><div class="sidebar-avatar" id="sb-avatar">U</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sb-name">User</div><div class="sidebar-user-role" id="sb-role">—</div></div></div>
    <nav class="sidebar-nav" id="sidebar-nav-main"></nav>
    <div class="sidebar-footer"><button class="nav-item" onclick="logout()" style="color:var(--col-error)"><span class="material-icons-round" style="color:var(--col-error)">logout</span>Sign Out</button></div>
  </aside>
  
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title"><h2>My Profile</h2><p>SE1020 — Student Course Registration System</p></div>
      <div class="topbar-actions"><button class="btn btn-secondary btn-sm" onclick="logout()"><span class="material-icons-round">logout</span>Sign Out</button></div>
    </div>
    
    <div class="page-body">
      <!-- [L2] Profile Hero Section -->
      <div class="profile-hero">
        <div class="profile-avatar-large" id="prof-avatar">JS</div>
        <div class="profile-hero-info">
          <!-- [L1] Injected by student-profile.js -->
          <h2 id="prof-name">Student Name</h2>
          <p id="prof-email-display">email@example.com</p>
          <p id="prof-dept-display" style="margin-top:4px;color:var(--col-300)">Department</p>
        </div>
        <div class="profile-hero-badge" id="prof-type-badge">Undergraduate</div>
      </div>
      
      <!-- [L2] Content Grid -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        
        <!-- [L1] Editable Form -->
        <div class="card" style="padding:28px">
          <h3 style="margin-bottom:20px">Personal Information</h3>
          <div class="field"><label>First Name</label><input type="text" id="prof-firstName" placeholder="First name"/></div>
          <div class="field"><label>Last Name</label><input type="text" id="prof-lastName" placeholder="Last name"/></div>
          <div class="field"><label>Email</label><input type="email" id="prof-email" placeholder="Email address"/></div>
          <div class="field"><label>Phone</label><input type="tel" id="prof-phone" placeholder="Phone number"/></div>
          <div class="field"><label>Date of Birth</label><input type="date" id="prof-dob"/></div>
          <div class="field"><label>Department</label><input type="text" id="prof-dept" placeholder="Department"/></div>
          <button class="btn btn-primary" onclick="saveProfile()"><span class="material-icons-round">save</span>Save Changes</button>
        </div>
        
        <!-- [L1] Read-Only Academic Summary -->
        <div class="card" style="padding:28px">
          <h3 style="margin-bottom:20px">Academic Summary</h3>
          <div style="display:grid;gap:16px">
            <div style="padding:16px;background:var(--col-50);border-radius:var(--radius-md)">
              <div style="font-size:.75rem;font-weight:700;color:var(--col-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Student ID</div>
              <div style="font-size:1.25rem;font-weight:800;color:var(--col-900);font-family:monospace" id="prof-id-display">—</div>
            </div>
            <div style="padding:16px;background:var(--col-50);border-radius:var(--radius-md)">
              <div style="font-size:.75rem;font-weight:700;color:var(--col-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Student Type</div>
              <div style="font-size:1rem;font-weight:700;color:var(--col-700)" id="prof-type-display">—</div>
            </div>
            <div style="padding:16px;background:var(--col-50);border-radius:var(--radius-md)">
              <div style="font-size:.75rem;font-weight:700;color:var(--col-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Enrollment Limit</div>
              <div style="font-size:1.25rem;font-weight:800;color:var(--col-900)" id="prof-limit-display">—</div>
            </div>
            <div style="padding:16px;background:var(--col-50);border-radius:var(--radius-md)">
              <div style="font-size:.75rem;font-weight:700;color:var(--col-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Active Enrollments</div>
              <div style="font-size:1.25rem;font-weight:800;color:var(--col-900)" id="prof-enroll-count">—</div>
            </div>
          </div>
        </div>
        
      </div>
    </div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/student-profile.js"></script>
</body>
</html>
