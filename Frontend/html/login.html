<!--
  ─────────────────────────────────────────────────────────────
  📁 FILE: Frontend/html/login.html
  🏗  LAYER: Frontend — View (HTML)
  📋 ROLE: Entry point for the application. Contains the login form.
  ─────────────────────────────────────────────────────────────
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="SCRS Login — Sign in to the Student Course Registration System"/>
<title>SCRS — Login</title>
<!-- [L1] Preconnect for faster font loading -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<!-- [L1] Import Inter font from Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<!-- [L1] Import Material Icons Rounded -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<!-- [L1] Load main stylesheet -->
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<!-- [L1] Container for toast notifications generated by auth.js -->
<div id="toast-container"></div>

<!-- [L2] Standalone page wrapper (no sidebar or topbar) -->
<div class="login-standalone page-standalone">
  <div class="login-card">
    
    <!-- [L1] App Logo & Title -->
    <div class="login-logo">
      <div class="login-logo-icon"><span class="material-icons-round">school</span></div>
      <div>
        <div class="login-logo-text">SC<span>RS</span></div>
        <div class="login-tagline">Student Course Registration System</div>
      </div>
    </div>
    
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your account to continue</div>

    <!-- [L2] Role Selection Tabs (Cosmetic, backend checks all roles regardless) -->
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchRole('STUDENT',this)">Student</button>
      <button class="login-tab" onclick="switchRole('LECTURER',this)">Lecturer</button>
      <button class="login-tab" onclick="switchRole('DEAN',this)">Dean</button>
    </div>

    <!-- [L1] Hidden alert banner for invalid login errors -->
    <div id="login-alert" class="alert alert-error hidden">
      <span class="material-icons-round">error_outline</span>
      <span id="login-alert-text"></span>
    </div>

    <!-- [L1] Email Input Field -->
    <div class="field">
      <label>Email Address</label>
      <div class="input-with-icon">
        <span class="material-icons-round">mail_outline</span>
        <input type="email" id="login-email" placeholder="Enter your email address" autocomplete="email"/>
      </div>
    </div>
    
    <!-- [L1] Password Input Field. Triggers login on "Enter" keypress -->
    <div class="field">
      <label>Password</label>
      <div class="input-with-icon">
        <span class="material-icons-round">lock_outline</span>
        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
    </div>

    <!-- [L1] Submit Button -->
    <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:4px" id="login-btn">
      <span class="material-icons-round">login</span>
      Sign In
    </button>

    <div style="text-align:center;margin-top:20px;font-size:.8125rem;color:var(--col-500)">
      Don't have an account?
      <!-- [L1] Redirects to the Students view (Note: normally this would be a public register page, but for this demo Deans add students) -->
      <a href="students.html" style="color:var(--col-700);font-weight:700;text-decoration:none">Register as Student</a>
    </div>

  </div>
</div>

<!-- [L1] Core Scripts -->
<script src="../js/auth.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
